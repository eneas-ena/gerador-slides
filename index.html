<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gerador de Apresentações · Igreja Vidas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  :root{
    --navy:#0F1B33; --deep:#0A1425; --gold:#C9A227; --cream:#F2EDE3;
    --muted:#9FB0C9; --card:#16253F;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--navy); color:var(--cream);
    font-family:'Cormorant Garamond',Georgia,serif; font-size:17px;
  }
  header{
    padding:22px 20px 16px; border-bottom:1px solid #24344f;
    background:linear-gradient(140deg,#0F1B33,#0A1425);
  }
  h1{
    font-family:'Cinzel',serif; font-size:24px; margin:0 0 4px; color:var(--gold);
    letter-spacing:.5px;
  }
  header p{margin:0; color:var(--muted); font-size:15px}
  main{max-width:1180px; margin:0 auto; padding:20px; display:grid; gap:18px;
       grid-template-columns:1fr 1fr}
  @media (max-width:900px){main{grid-template-columns:1fr}}
  .painel{background:var(--card); border:1px solid #24344f; border-radius:12px; padding:16px}
  .painel h2{font-family:'Cinzel',serif; font-size:15px; color:var(--gold);
             margin:0 0 12px; letter-spacing:1px; text-transform:uppercase}
  textarea{
    width:100%; height:340px; background:var(--deep); color:var(--cream);
    border:1px solid #2b3d5c; border-radius:8px; padding:12px;
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; line-height:1.5;
    resize:vertical;
  }
  .barra{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px}
  button{
    font-family:'Cinzel',serif; font-size:13px; letter-spacing:.6px;
    padding:10px 16px; border-radius:8px; border:1px solid var(--gold);
    background:transparent; color:var(--gold); cursor:pointer;
  }
  button:hover{background:rgba(201,162,39,.12)}
  button.primario{background:var(--gold); color:var(--navy); font-weight:700}
  button.primario:hover{filter:brightness(1.08)}
  .lista{max-height:420px; overflow:auto; margin:0; padding:0; list-style:none}
  .lista li{
    border-bottom:1px solid #24344f; padding:9px 4px; display:flex; gap:10px;
    align-items:flex-start; font-size:15px;
  }
  .lista li:last-child{border-bottom:0}
  .idx{color:var(--gold); font-family:'Cinzel',serif; font-size:12px; min-width:26px}
  .tag{
    font-family:ui-monospace,monospace; font-size:11px; color:var(--navy);
    background:var(--muted); border-radius:4px; padding:1px 6px; white-space:nowrap;
  }
  .resumo{color:var(--muted); flex:1}
  #avisos{margin-top:12px; font-size:14.5px}
  .aviso{border-left:3px solid var(--gold); padding:6px 10px; margin-bottom:6px;
         background:rgba(201,162,39,.08); border-radius:0 6px 6px 0}
  .erro{border-left-color:#e06060; background:rgba(224,96,96,.10)}
  .ok{color:#8fd0a0}
  footer{padding:14px 20px 40px; text-align:center; color:var(--muted); font-size:13px}
  code{font-family:ui-monospace,monospace; font-size:12px; color:var(--gold)}
</style>
</head>
<body>

<header>
  <h1>Gerador de Apresentações</h1>
  <p>Etapa 1 — núcleo do gerador · 22 layouts nativos · JSON → PPTX editável</p>
</header>

<main>
  <section class="painel">
    <h2>Roteiro (JSON)</h2>
    <textarea id="json" spellcheck="false"></textarea>
    <div class="barra">
      <button onclick="carregarDemo()">Carregar exemplo</button>
      <button onclick="validar(true)">Validar</button>
      <button class="primario" onclick="gerar()">Gerar PPTX</button>
    </div>
  </section>

  <section class="painel">
    <h2>Slides propostos</h2>
    <ul class="lista" id="lista"><li class="resumo">Carregue ou cole um roteiro.</li></ul>
    <div id="avisos"></div>
  </section>
</main>

<footer>
  Igreja Vidas · MENTOR — <code>LAYOUT_WIDE 13,33" × 7,5"</code>
</footer>

<script>
/* ==========================================================================
   1. IDENTIDADE VISUAL  (hex SEM "#" — exigência do PptxGenJS)
   ========================================================================== */
const C = {
  NAVY : '0F1B33',
  DEEP : '0A1425',
  GOLD : 'C9A227',
  CREAM: 'F2EDE3',
  MUTED: '9FB0C9',
  CARD : '16253F'
};
const FT = 'Cinzel';               // títulos
const FB = 'Cormorant Garamond';   // corpo

const M   = 0.9;    // margem lateral
const WU  = 11.5;   // largura útil
const BASE= 7.15;   // limite inferior seguro

/* ==========================================================================
   2. FUNDOS GRADIENTE  (Canvas → dataURL)
   ========================================================================== */
const _bgCache = {};
function gradienteRadial(cx, cy, cor1, cor2, w = 1920, h = 1080){
  const chave = [cx,cy,cor1,cor2].join('|');
  if (_bgCache[chave]) return _bgCache[chave];
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = cor1; ctx.fillRect(0,0,w,h);
  const g = ctx.createRadialGradient(cx*w, cy*h, 0, cx*w, cy*h, Math.hypot(w,h)*0.6);
  g.addColorStop(0, cor2);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  const url = c.toDataURL('image/jpeg', 0.9);
  _bgCache[chave] = url;
  return url;
}
// variantes testadas
const BG = {
  capa      : () => gradienteRadial(0.80, 0.18, '#0F1B33', 'rgba(201,162,39,0.26)'),
  centro    : () => gradienteRadial(0.50, 0.45, '#0A1425', 'rgba(201,162,39,0.20)'),
  esquerda  : () => gradienteRadial(0.18, 0.50, '#0F1B33', 'rgba(159,176,201,0.18)'),
  inferior  : () => gradienteRadial(0.50, 0.95, '#0A1425', 'rgba(201,162,39,0.24)'),
  liso      : () => gradienteRadial(0.50, 0.50, '#0F1B33', 'rgba(22,37,63,0.65)')
};
function fundo(slide, variante){
  slide.background = { data: BG[variante || 'liso']() };
}

/* ==========================================================================
   3. AJUDANTES  (todo objeto de opções é NOVO a cada chamada)
   ========================================================================== */
const txt = (o) => Object.assign({
  fontFace: FB, color: C.CREAM, valign: 'top', margin: 0, isTextBox: true
}, o);

function eyebrow(slide, texto, x, y, w){
  if (!texto) return;
  slide.addText(String(texto).toUpperCase(), txt({
    x:x, y:y, w:w||8.0, h:0.40, fontFace:FT, fontSize:16, bold:true,
    color:C.GOLD, charSpacing:5
  }));
}
function faixaRemate(slide, texto, x, y, w, h){
  if (!texto) return;
  slide.addShape('roundRect', { x:x, y:y, w:w, h:h, fill:{color:C.GOLD}, rectRadius:0.1, line:{color:C.GOLD} });
  slide.addText(String(texto), txt({
    x:x+0.35, y:y, w:w-0.7, h:h, fontSize:22, bold:true, color:C.NAVY,
    align:'center', valign:'middle'
  }));
}
function cartao(slide, x, y, w, h){
  slide.addShape('roundRect', { x:x, y:y, w:w, h:h, fill:{color:C.CARD}, rectRadius:0.1, line:{color:'24344F'} });
}
function circuloNum(slide, n, x, y, d){
  d = d || 0.56;
  slide.addShape('ellipse', { x:x, y:y, w:d, h:d, fill:{color:C.NAVY}, line:{color:C.GOLD, width:1.25} });
  slide.addText(String(n), txt({
    x:x, y:y, w:d, h:d, fontFace:FT, fontSize:17, bold:true, color:C.GOLD,
    align:'center', valign:'middle'
  }));
}
function bullets(slide, itens, o){
  const linhas = (itens||[]).map(t => ({
    text: String(t),
    options: { bullet:{ code:'2022' }, paraSpaceAfter:12 }
  }));
  if (!linhas.length) return;
  slide.addText(linhas, txt(Object.assign({ fontSize:21, lineSpacing:28, fit:'shrink' }, o)));
}

/* ==========================================================================
   4. BIBLIOTECA DE LAYOUTS  (22)
   ========================================================================== */
const LAYOUTS = {};

/* --- 4.1 validados no estudo bíblico ----------------------------------- */

LAYOUTS.capa = (s, f) => {
  fundo(s, 'capa');
  eyebrow(s, f.eyebrow, 0.9, 1.55, 8.0);
  if (f.linha1) s.addText(f.linha1, txt({ x:0.85, y:2.15, w:9.0, h:1.0, fontFace:FT, fontSize:52, bold:true, color:C.CREAM }));
  if (f.linha2) s.addText(f.linha2, txt({ x:0.85, y:3.10, w:9.0, h:1.0, fontFace:FT, fontSize:52, bold:true, color:C.GOLD }));
  if (f.subtitulo) s.addText(f.subtitulo, txt({ x:0.9, y:4.35, w:7.6, h:0.9, fontSize:24, italic:true, color:C.MUTED }));
  if (f.rodape) s.addText(String(f.rodape).toUpperCase(), txt({ x:0.9, y:6.40, w:6.0, h:0.38, fontSize:15, color:C.MUTED, charSpacing:4 }));
  s.addShape('rect', { x:0.9, y:6.15, w:1.6, h:0.045, fill:{color:C.GOLD}, line:{color:C.GOLD} });
};

LAYOUTS.declaracao = (s, f) => {
  fundo(s, 'centro');
  let y = 1.20;
  (f.antetitulo||[]).forEach(t => {
    s.addText(String(t).toUpperCase(), txt({ x:M, y:y, w:WU, h:0.38, fontFace:FT, fontSize:15, bold:true, color:C.GOLD, charSpacing:4, align:'center' }));
    y += 0.44;
  });
  if (f.frase) s.addText(f.frase, txt({ x:M, y:y+0.25, w:WU, h:3.0, fontFace:FT, fontSize:40, bold:true, color:C.CREAM, align:'center', lineSpacing:48 }));
  if (f.apoio) s.addText(f.apoio, txt({ x:1.9, y:5.45, w:9.5, h:1.2, fontSize:23, italic:true, color:C.MUTED, align:'center' }));
};

LAYOUTS.roteiro = (s, f) => {
  fundo(s, 'liso');
  if (f.titulo) s.addText(f.titulo, txt({ x:M, y:0.95, w:WU, h:0.8, fontFace:FT, fontSize:34, bold:true, color:C.GOLD }));
  s.addShape('rect', { x:M, y:1.85, w:1.4, h:0.04, fill:{color:C.GOLD}, line:{color:C.GOLD} });
  const itens = f.itens || [];
  let y = 2.25;
  const alt = Math.min(1.15, (BASE - 2.35) / Math.max(itens.length,1));
  itens.forEach((it,i) => {
    circuloNum(s, it.num != null ? it.num : (i+1), M, y, 0.56);
    s.addText(String(it.texto||''), txt({ x:M+0.82, y:y+0.02, w:WU-0.92, h:alt-0.1, fontSize:24, color:C.CREAM }));
    y += alt;
  });
};

LAYOUTS.ponto = (s, f) => {
  fundo(s, 'liso');
  s.addShape('rect', { x:0, y:0, w:4.6, h:7.5, fill:{color:C.DEEP}, line:{color:C.DEEP} });
  s.addShape('rect', { x:4.6, y:0, w:0.05, h:7.5, fill:{color:C.GOLD}, line:{color:C.GOLD} });
  if (f.num != null) s.addText('PONTO ' + f.num, txt({ x:0.75, y:1.35, w:3.4, h:0.40, fontFace:FT, fontSize:16, bold:true, color:C.GOLD, charSpacing:4 }));
  if (f.titulo) s.addText(f.titulo, txt({ x:0.75, y:1.90, w:3.5, h:3.2, fontFace:FT, fontSize:27, bold:true, color:C.CREAM, lineSpacing:32 }));
  if (f.afirmacao) s.addText(f.afirmacao, txt({ x:5.5, y:1.00, w:6.9, h:1.5, fontFace:FT, fontSize:22, bold:true, color:C.GOLD, lineSpacing:28 }));
  bullets(s, f.corpo, { x:5.5, y:2.60, w:6.9, h:2.45, fontSize:21, color:C.CREAM });
  if (f.ref || f.sigla) {
    cartao(s, 5.5, 5.25, 6.9, 1.6);
    if (f.ref) s.addText(f.ref, txt({ x:5.75, y:5.42, w:6.4, h:1.0, fontSize:19, italic:true, color:C.CREAM, lineSpacing:25, fit:'shrink' }));
    if (f.sigla) s.addText(String(f.sigla).toUpperCase(), txt({ x:5.75, y:6.45, w:6.4, h:0.32, fontSize:15, bold:true, color:C.GOLD, charSpacing:3 }));
  }
};

LAYOUTS.ilustracao = (s, f) => {
  fundo(s, 'esquerda');
  eyebrow(s, f.eyebrow || 'Ilustração', 0.9, 1.15, 5.0);
  if (f.titulo) s.addText(f.titulo, txt({ x:0.9, y:1.60, w:10.5, h:0.95, fontFace:FT, fontSize:38, bold:true, color:C.CREAM }));
  if (f.texto) s.addText(f.texto, txt({ x:0.9, y:2.75, w:10.0, h:1.7, fontSize:25, italic:true, color:C.MUTED, lineSpacing:30 }));
  faixaRemate(s, f.remate, 0.9, 4.90, 10.0, 1.35);
};

LAYOUTS.contraste = (s, f) => {
  fundo(s, 'liso');
  if (f.titulo) s.addText(f.titulo, txt({ x:M, y:0.95, w:WU, h:0.8, fontFace:FT, fontSize:32, bold:true, color:C.GOLD, align:'center' }));
  const lados = [['esq', M], ['dir', 6.95]];
  lados.forEach(([k,x]) => {
    const d = f[k] || {};
    cartao(s, x, 2.05, 5.45, 3.00);
    if (d.rotulo) s.addText(String(d.rotulo).toUpperCase(), txt({ x:x+0.35, y:2.32, w:4.75, h:0.40, fontFace:FT, fontSize:17, bold:true, color:C.GOLD, charSpacing:3 }));
    if (d.texto) s.addText(d.texto, txt({ x:x+0.35, y:2.90, w:4.75, h:1.95, fontSize:21, color:C.CREAM, lineSpacing:27, fit:'shrink' }));
  });
  faixaRemate(s, f.remate, M, 5.40, WU, 1.05);
};

LAYOUTS.cards3 = (s, f) => {
  fundo(s, 'liso');
  if (f.titulo) s.addText(f.titulo, txt({ x:M, y:0.95, w:WU, h:0.8, fontFace:FT, fontSize:32, bold:true, color:C.GOLD }));
  const itens = (f.itens||[]).slice(0,3);
  const larg = (WU - 0.6) / Math.max(itens.length,1);
  itens.forEach((it,i) => {
    const x = M + i*(larg+0.3);
    cartao(s, x, 2.15, larg, 3.6);
    circuloNum(s, it.num != null ? it.num : (i+1), x+0.35, 2.45, 0.5);
    if (it.titulo) s.addText(it.titulo, txt({ x:x+0.35, y:3.15, w:larg-0.7, h:0.78, fontFace:FT, fontSize:20, bold:true, color:C.CREAM }));
    if (it.texto) s.addText(it.texto, txt({ x:x+0.35, y:4.00, w:larg-0.7, h:1.70, fontSize:20, color:C.MUTED, lineSpacing:26, fit:'shrink' }));
  });
};

LAYOUTS.chips = (s, f) => {
  fundo(s, 'liso');
  if (f.titulo) s.addText(f.titulo, txt({ x:M, y:0.95, w:WU, h:0.75, fontFace:FT, fontSize:32, bold:true, color:C.GOLD }));
  if (f.subtitulo) s.addText(f.subtitulo, txt({ x:M, y:1.75, w:WU, h:0.5, fontSize:20, italic:true, color:C.MUTED }));
  let x = M, y = 2.60;
  (f.chips||[]).forEach(t => {
    const w = Math.min(5.4, 0.60 + String(t).length * 0.150);
    if (x + w > M + WU) { x = M; y += 0.86; }
    s.addShape('roundRect', { x:x, y:y, w:w, h:0.68, fill:{color:C.CARD}, rectRadius:0.34, line:{color:C.GOLD, width:0.75} });
    s.addText(String(t), txt({ x:x, y:y, w:w, h:0.68, fontSize:20, color:C.CREAM, align:'center', valign:'middle' }));
    x += w + 0.25;
  });
  faixaRemate(s, f.remate, M, 5.75, WU, 0.9);
};

LAYOUTS.perguntas = (s, f) => {
  fundo(s, 'liso');
  eyebrow(s, f.eyebrow || 'Para refletir', M, 0.95, 8.0);
  if (f.titulo) s.addText(f.titulo, txt({ x:M, y:1.40, w:WU, h:0.8, fontFace:FT, fontSize:32, bold:true, color:C.CREAM }));
  const itens = f.itens || [];
  let y = 2.50;
  const alt = Math.min(1.18, (BASE - 2.60) / Math.max(itens.length,1));
  itens.forEach((t,i) => {
    circuloNum(s, i+1, M, y, 0.56);
    s.addText(String(t), txt({ x:M+0.82, y:y+0.03, w:WU-0.92, h:alt-0.1, fontSize:22, color:C.CREAM, lineSpacing:28, fit:'shrink' }));
    y += alt;
  });
};

LAYOUTS.cartoes = (s, f) => {
  fundo(s, 'liso');
  eyebrow(s, f.eyebrow, M, 0.95, 8.0);
  if (f.titulo) s.addText(f.titulo, txt({ x:M, y:1.40, w:WU, h:0.75, fontFace:FT, fontSize:30, bold:true, color:C.GOLD }));
  const itens = (f.itens||[]).slice(0,4);
  let y = 2.40;
  const alt = Math.min(1.45, (BASE - 2.45) / Math.max(itens.length,1) - 0.14);
  itens.forEach(t => {
    cartao(s, M, y, WU, alt);
    s.addShape('rect', { x:M, y:y, w:0.06, h:alt, fill:{color:C.GOLD}, line:{color:C.GOLD} });
    s.addText(String(t), txt({ x:M+0.35, y:y+0.12, w:WU-0.7, h:alt-0.24, fontSize:20, color:C.CREAM, lineSpacing:26, fit:'shrink', valign:'middle' }));
    y += alt + 0.14;
  });
};

LAYOUTS.versiculo = (s, f) => {
  fundo(s, 'centro');
  eyebrow(s, f.eyebrow || 'Palavra', 0.9, 1.15, 8.0);
  if (f.texto) s.addText('“' + f.texto + '”', txt({ x:0.9, y:2.00, w:11.0, h:3.0, fontFace:FT, fontSize:40, bold:true, color:C.CREAM, lineSpacing:48, align:'center' }));
  if (f.ref) s.addText(String(f.ref).toUpperCase(), txt({ x:0.9, y:5.30, w:11.0, h:0.48, fontSize:19, bold:true, color:C.GOLD, charSpacing:4, align:'center' }));
};

LAYOUTS.texto_longo = (s, f) => {
  fundo(s, 'liso');
  eyebrow(s, f.eyebrow, M, 0.95, 8.0);
  if (f.bloco1) s.addText(f.bloco1, txt({ x:M, y:1.60, w:5.45, h:4.9, fontSize:21, color:C.CREAM, lineSpacing:28, fit:'shrink' }));
  if (f.bloco2) s.addText(f.bloco2, txt({ x:6.95, y:1.60, w:5.45, h:4.9, fontSize:21, color:C.CREAM, lineSpacing:28, fit:'shrink' }));
  if (f.rodape) s.addText(String(f.rodape).toUpperCase(), txt({ x:M, y:6.68, w:WU, h:0.38, fontSize:15, color:C.MUTED, charSpacing:4 }));
};

/* --- 4.2 novos: exigidos pelo sermão ----------------------------------- */

LAYOUTS.leitura_biblica = (s, f) => {
  fundo(s, 'liso');
  eyebrow(s, f.ref || 'Leitura bíblica', M, 0.95, 8.0);
  s.addShape('rect', { x:M, y:1.42, w:1.4, h:0.04, fill:{color:C.GOLD}, line:{color:C.GOLD} });
  const vs = f.versiculos || [];
  let y = 1.75;
  const alt = Math.min(1.30, (BASE - 1.85) / Math.max(vs.length,1));
  vs.forEach(v => {
    s.addText(String(v.n), txt({ x:M, y:y, w:0.48, h:0.4, fontFace:FT, fontSize:16, bold:true, color:C.GOLD, align:'right' }));
    s.addText(String(v.texto||''), txt({ x:M+0.66, y:y-0.06, w:WU-0.76, h:alt-0.05, fontSize:20, color:C.CREAM, lineSpacing:27, fit:'shrink' }));
    y += alt;
  });
  if (f.continua) s.addText('(continua)', txt({ x:M, y:6.82, w:3.0, h:0.33, fontSize:16, italic:true, color:C.MUTED }));
};

LAYOUTS.cascata = (s, f) => {
  fundo(s, 'centro');
  const fr = f.frases || [];
  const enf = (f.enfase != null) ? Number(f.enfase) : -1;
  const n = Math.max(fr.length, 1);
  const alt = Math.min(1.15, (BASE - 1.50) / n);
  let y = Math.max(1.35, (7.5 - n*alt) / 2);
  fr.forEach((t,i) => {
    const destaque = (i === enf);
    const tam = destaque ? 38 : Math.min(34, 24 + i*4);
    s.addText(String(t), txt({
      x:M + i*0.35, y:y, w:WU - i*0.35, h:alt,
      fontFace:FT, fontSize:tam, bold:destaque || i>0,
      color: destaque ? C.GOLD : C.CREAM, valign:'middle'
    }));
    y += alt;
  });
};

LAYOUTS.recapitulacao = (s, f) => {
  fundo(s, 'liso');

/* ==========================================================================
   5. VALIDAÇÃO (regra 7 da seção 6: título ≤60, item ≤140, máx. 4 itens)
   ========================================================================== */
const LIM_TITULO = 60, LIM_FRASE = 95, LIM_ITEM = 140, MAX_ITENS = 4;

function validarRoteiro(r){
  const avisos = [];
  (r.avisos||[]).forEach(a => avisos.push({ tipo:'ia', msg:a }));
  (r.slides||[]).forEach((sl, i) => {
    const n = i+1;
    if (!LAYOUTS[sl.layout]) {
      avisos.push({ tipo:'erro', msg:`Slide ${n}: layout "${sl.layout}" não existe na biblioteca.` });
      return;
    }
    const f = sl.campos || {};
    [['titulo',LIM_TITULO],['afirmacao',LIM_TITULO],['termo',LIM_TITULO],
     ['frase',LIM_FRASE],['pergunta',LIM_FRASE]].forEach(([k,lim]) => {
      if (f[k] && String(f[k]).length > lim)
        avisos.push({ tipo:'aviso', msg:`Slide ${n} (${sl.layout}): campo "${k}" com ${String(f[k]).length} caracteres (limite ${lim}).` });
    });
    ['corpo','itens','linhas','chips','frases','versiculos','etapas'].forEach(k => {
      const arr = f[k];
      if (!Array.isArray(arr)) return;
      if (arr.length > MAX_ITENS && k !== 'chips' && k !== 'frases' && k !== 'versiculos')
        avisos.push({ tipo:'aviso', msg:`Slide ${n} (${sl.layout}): ${arr.length} itens em "${k}" (máximo recomendado ${MAX_ITENS}).` });
      arr.forEach((it, j) => {
        const t = (typeof it === 'string') ? it : (it.texto || it.titulo || '');
        if (String(t).length > LIM_ITEM)
          avisos.push({ tipo:'aviso', msg:`Slide ${n} (${sl.layout}): item ${j+1} de "${k}" com ${String(t).length} caracteres (limite ${LIM_ITEM}).` });
      });
    });
    if (!sl.notas && !['capa','divisor_secao'].includes(sl.layout))
      avisos.push({ tipo:'aviso', msg:`Slide ${n} (${sl.layout}): sem notas do orador.` });
  });
  return avisos;
}

/* ==========================================================================
   6. GERAÇÃO
   ========================================================================== */
function montar(roteiro){
  const pres = new PptxGenJS();
  pres.layout = 'LAYOUT_WIDE';            // ANTES de qualquer slide
  pres.author = 'Bispo Enéas Araújo';
  pres.company = 'Igreja Vidas';
  pres.title = roteiro.titulo || 'Apresentação';
  pres.subject = roteiro.subtitulo || '';

  (roteiro.slides||[]).forEach(sl => {
    const fn = LAYOUTS[sl.layout];
    if (!fn) return;
    const slide = pres.addSlide();
    fn(slide, sl.campos || {}, pres);
    if (sl.notas) slide.addNotes(String(sl.notas));
  });

  const nome = (roteiro.titulo || 'apresentacao')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-|-$/g,'').toLowerCase();
  return pres.writeFile({ fileName: nome + '.pptx' });
}

/* ==========================================================================
   7. INTERFACE
   ========================================================================== */
function lerJSON(){
  try { return JSON.parse(document.getElementById('json').value); }
  catch(e){ mostrarAvisos([{ tipo:'erro', msg:'JSON inválido: ' + e.message }]); return null; }
}
function mostrarAvisos(avisos){
  const box = document.getElementById('avisos');
  if (!avisos.length) { box.innerHTML = '<div class="aviso ok">Sem pendências. Roteiro pronto para gerar.</div>'; return; }
  box.innerHTML = avisos.map(a =>
    `<div class="aviso ${a.tipo==='erro'?'erro':''}">${a.tipo==='ia'?'⚑ ':''}${a.msg}</div>`
  ).join('');
}
function listar(r){
  const ul = document.getElementById('lista');
  ul.innerHTML = (r.slides||[]).map((sl,i) => {
    const f = sl.campos||{};
    const res = f.titulo || f.frase || f.linha1 || f.termo || f.pergunta || f.ref ||
                f.eyebrow || (f.frases&&f.frases[0]) || f.autor || '—';
    return `<li><span class="idx">${String(i+1).padStart(2,'0')}</span>
            <span class="tag">${sl.layout}</span>
            <span class="resumo">${String(res).slice(0,90)}</span></li>`;
  }).join('') || '<li class="resumo">Nenhum slide no roteiro.</li>';
}
function validar(mostrar){
  const r = lerJSON(); if (!r) return null;
  listar(r);
  const av = validarRoteiro(r);
  if (mostrar) mostrarAvisos(av);
  return { roteiro:r, avisos:av };
}
function gerar(){
  const v = validar(true); if (!v) return;
  if (v.avisos.some(a => a.tipo==='erro')) { alert('Corrija os erros antes de gerar.'); return; }
  montar(v.roteiro).catch(e => { console.error(e); alert('Falha ao gerar: ' + e.message); });
}
function carregarDemo(){
  document.getElementById('json').value = JSON.stringify(DEMO, null, 2);
  validar(true);
}
